name: Generate routing rules for Surge
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 上传结果到 release 分支，并触发 jsDelivr purge
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "30 22 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"

concurrency:
  group: surge-rules-${{ github.ref }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the default branch
        uses: actions/checkout@v6

      - name: Set release metadata
        run: |
          echo "RELEASE_NAME=Released on $(date +'%Y-%m-%d %H:%M %Z')" >> "${GITHUB_ENV}"
          echo "TAG_NAME=$(date +'%Y%m%d%H%M%S')" >> "${GITHUB_ENV}"

      - name: Set runtime options
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "PUBLISH_ASSETS=${{ github.event.inputs.publish }}" >> "${GITHUB_ENV}"
          else
            echo "PUBLISH_ASSETS=true" >> "${GITHUB_ENV}"
          fi

      - name: Generate routing rules
        run: bash .github/scripts/build-rules.sh

      - name: Release and upload assets
        if: env.PUBLISH_ASSETS == 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            ./publish/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Git push assets to "release" branch
        if: env.PUBLISH_ASSETS == 'true'
        run: |
          cd publish || exit 1
          git init -b release
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          remote_exists=1
          if git ls-remote --exit-code --heads origin release > /dev/null 2>&1; then
            git fetch --depth=1 origin release
            if git diff --quiet HEAD "origin/release"; then
              echo "No release asset changes detected, skip push to avoid duplicate commit."
              exit 0
            fi
          else
            remote_exists=0
          fi
          if [[ "${remote_exists}" -eq 1 ]]; then
            git push --force-with-lease -u origin release
          else
            git push -u origin release
          fi

      - name: Purge jsdelivr CDN
        if: env.PUBLISH_ASSETS == 'true'
        run: |
          set -euo pipefail
          failed=0
          while IFS= read -r file; do
            path="${file#publish/}"
            if ! curl \
              --retry-all-errors \
              --connect-timeout 15 \
              --max-time 20 \
              --fail \
              --location \
              --silent \
              --show-error \
              --retry 3 \
              --retry-delay 2 \
              "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${path}" \
              > /dev/null; then
              echo "::warning::Purge request failed: ${path}"
              failed=$((failed + 1))
            fi
          done < <(find publish -mindepth 1 -type f -name "*.txt" | sort)
          if [[ "${failed}" -gt 0 ]]; then
            echo "::error::jsDelivr purge had ${failed} failed request(s)."
            exit 1
          fi
